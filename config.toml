[[params.services]]
  name        = "DMLS & SLM Printing"
  icon        = "◎"
  image       = "https://images.unsplash.com/photo-1581091226033-d5c48150dbaa?w=600&q=80"
  description = "Direct Metal Laser Sintering and Selective Laser Melting for fully dense metal parts in titanium, stainless steel, Inconel, and aluminum alloys."

[[params.services]]
  name        = "Rapid Prototyping"
  icon        = "✦"
  image       = "https://images.unsplash.com/photo-1565043666747-69f6646db940?w=600&q=80"
  description = "Functional metal prototypes in as little as 48 hours. Iterate designs with production-grade materials and mechanical properties."

[[params.services]]
  name        = "Post-Processing & Finishing"
  icon        = "⚙"
  image       = "https://images.unsplash.com/photo-1635070041078-e363dbe005cb?w=600&q=80"
  description = "Stress relief, HIP, CNC machining to ±0.001\", EDM, bead blast, electropolish, and anodizing — full post-processing chain."

[[params.services]]
  name        = "DfAM Consulting"
  icon        = "◈"
  image       = "https://images.unsplash.com/photo-1632913516644-9c0861f6fbf5?w=600&q=80"
  description = "Topology optimization, support strategy, assembly consolidation, and design-for-additive consultation to maximize performance."

[[params.applications]]
  title       = "Aerospace"
  description = "Lightweight turbine blades, brackets, and structural components meeting AS9100 standards. Ti6Al4V and Inconel 718 for extreme environments."
  image       = "https://images.unsplash.com/photo-1717785942714-cf4a0aad49b3?w=600&q=80"

[[params.applications]]
  title       = "Medical"
  description = "Biocompatible implants, surgical instruments, and custom prosthetics in titanium and CoCrMo. ASTM F136 and ISO 5832 compliant."
  image       = "https://images.unsplash.com/photo-1581091226033-d5c48150dbaa?w=600&q=80"

[[params.applications]]
  title       = "Industrial"
  description = "Custom tooling, conformal cooling inserts, and production fixtures with complex internal geometries impossible to machine conventionally."
  image       = "https://images.unsplash.com/photo-1565043666747-69f6646db940?w=600&q=80"

[[params.applications]]
  title       = "Energy"
  description = "High-temperature components for turbines, heat exchangers, and nuclear applications in Inconel 625, 718, and refractory alloys."
  image       = "https://images.unsplash.com/photo-1563520239648-a24e4483820a?w=600&q=80"

